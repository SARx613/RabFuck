<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#fafafa">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Rabieta · Retiro confirmado</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
  <link rel="stylesheet" href="./assets/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <div class="app">
    <div class="content">
      <div class="success-screen">
        <div class="success-check">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <h1 class="success-title">¡Retiro confirmado!</h1>
        <p class="success-subtitle">Acercate al mostrador para retirar tus productos.</p>

        <ul class="product-list success-list" id="confirmedList"></ul>

        <div class="success-code">
          <p class="success-code-label">Código de retiro</p>
          <p class="success-code-value" id="pickupCode">—</p>
        </div>

        <button class="primary-button" id="homeBtn" type="button">
          <p>Volver al inicio</p>
        </button>
      </div>
    </div>
  </div>

  <script src="./assets/app.js"></script>
  <script src="./assets/confirm.js"></script>
</body>
</html>
