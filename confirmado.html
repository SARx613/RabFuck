<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f87171">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Rabieta · Retiro confirmado</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
  <link rel="stylesheet" href="./assets/styles.css">
  <link rel="stylesheet" href="./assets/confirmado.css">
</head>
<body>
  <main class="confirmado-main">
    <header class="header">
      <div class="title">
        <p class="title-text">Retiro</p>
      </div>
    </header>

    <div class="confirmado-body">
      <div class="confirmado-check">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <h1 class="confirmado-title">¡Retiraste tus productos!</h1>
    </div>
  </main>

  <script src="./assets/app.js"></script>
  <script>
    setTimeout(function() {
      sessionStorage.removeItem("rabieta:selected");
      sessionStorage.removeItem("rabieta:code");
      window.location.href = "./index.html";
    }, 4000);
  </script>
</body>
</html>
