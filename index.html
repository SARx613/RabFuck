  <title>Rabieta · Mis productos</title>

        </div>

          </div>
          <button class="pill-button" id="selectAllBtn" type="button">
            <p>Todos</p>
          </button>
        </div>

        <!-- Product list -->
        <ul class="product-list" id="productList"></ul>
      </div>

      <!-- Action bar -->
      <div class="action-buttons">
        <div class="button-container">
          <p class="count-text" id="count">0 Productos</p>
          <button class="primary-button disabled" id="confirmBtn" type="button">
            <p>Confirmar Retiro</p>
